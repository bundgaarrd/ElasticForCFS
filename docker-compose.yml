version: '3.3'
services:
    elasticsearch:
        container_name: es01
        networks:
            - elastic
        ports:
            - '9200:9200'
        stdin_open: true
        tty: true
        deploy:
            resources:
                limits:
                    memory: 6GB
        image: 'docker.elastic.co/elasticsearch/elasticsearch:9.3.1'

    kibana:
        container_name: kib01
        networks:
            - elastic
        ports:
            - '80:5601'
        image: 'docker.elastic.co/kibana/kibana:9.3.1'
networks:
    elastic:
        external:
            name: elastic